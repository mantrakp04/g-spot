name: Bug report
description: Something is broken or behaving unexpectedly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: app
    attributes:
      label: Affected app/package
      description: e.g. apps/web, apps/desktop, apps/server, apps/relay, packages/api
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Git SHA, release tag, or desktop app version
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Windows
        - Linux
        - Other / N/A
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      render: shell
    validations:
      required: false
