name: Auto-close external PRs

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Close PR if author is not whitelisted
        uses: actions/github-script@v7
        env:
          # Comma-separated list of GitHub usernames allowed to open PRs.
          ALLOWED_AUTHORS: "mantrakp04"
        with:
          script: |
            const allowed = (process.env.ALLOWED_AUTHORS || "")
              .split(",")
              .map(s => s.trim().toLowerCase())
              .filter(Boolean);
            const author = (context.payload.pull_request.user.login || "").toLowerCase();
            const { owner, repo } = context.repo;
            const number = context.payload.pull_request.number;

            if (allowed.includes(author)) {
              core.info(`Author @${author} is whitelisted. Skipping.`);
              return;
            }

            await github.rest.issues.createComment({
              owner, repo, issue_number: number,
              body: [
                `Hey @${author}, thanks for the interest!`,
                ``,
                `This repo isn't accepting external pull requests right now, so I'm closing this automatically.`,
                `If you've found a bug or want to request a feature, please open an issue instead.`,
              ].join("\n"),
            });

            await github.rest.pulls.update({
              owner, repo, pull_number: number, state: "closed",
            });
