name: Desktop release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - nightly
  push:
    branches: [main]
    paths:
      - apps/desktop/package.json

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.event_name == 'push' && 'nightly' || inputs.channel || 'stable' }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve release
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.resolve.outputs.should_release }}
      channel: ${{ steps.resolve.outputs.channel }}
      version: ${{ steps.resolve.outputs.version }}
      build_script: ${{ steps.resolve.outputs.build_script }}
      version_release_tag: ${{ steps.resolve.outputs.version_release_tag }}
      update_release_tag: ${{ steps.resolve.outputs.update_release_tag }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
      title: ${{ steps.resolve.outputs.title }}
      update_title: ${{ steps.resolve.outputs.update_title }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: resolve
        shell: bash
        run: |
          set -euo pipefail

          version="$(node -p "require('./apps/desktop/package.json').version")"
          if [[ -z "$version" || "$version" == "undefined" ]]; then
            echo "apps/desktop/package.json must define version" >&2
            exit 1
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            channel="nightly"
            before="${{ github.event.before }}"
            previous_version=""

            if [[ -n "$before" && "$before" != "0000000000000000000000000000000000000000" ]] && git cat-file -e "$before:apps/desktop/package.json" 2>/dev/null; then
              previous_version="$(
                git show "$before:apps/desktop/package.json" \
                  | node -e "let input=''; process.stdin.on('data', c => input += c); process.stdin.on('end', () => console.log(JSON.parse(input).version ?? ''));"
              )"
            fi

            if [[ "$version" == "$previous_version" ]]; then
              should_release="false"
            else
              should_release="true"
            fi
          else
            channel="${{ inputs.channel || 'stable' }}"
            should_release="true"
          fi

          if [[ "$channel" == "stable" ]]; then
            build_script="build:stable"
            version_release_tag="desktop-v${version}"
            update_release_tag="desktop-stable"
            prerelease="false"
            title="Desktop v${version}"
            update_title="Desktop Stable"
          else
            build_script="build:nightly"
            version_release_tag="desktop-nightly-v${version}"
            update_release_tag="desktop-nightly"
            prerelease="true"
            title="Desktop Nightly v${version}"
            update_title="Desktop Nightly"
          fi

          {
            echo "should_release=$should_release"
            echo "channel=$channel"
            echo "version=$version"
            echo "build_script=$build_script"
            echo "version_release_tag=$version_release_tag"
            echo "update_release_tag=$update_release_tag"
            echo "prerelease=$prerelease"
            echo "title=$title"
            echo "update_title=$update_title"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ needs.resolve.outputs.channel }} (${{ matrix.name }})
    needs: resolve
    if: needs.resolve.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runner: macos-15
    env:
      DESKTOP_RELEASE_TAG: ${{ needs.resolve.outputs.update_release_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun check-types

      - name: Build desktop
        run: bun run --filter desktop ${{ needs.resolve.outputs.build_script }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ needs.resolve.outputs.channel }}-${{ matrix.name }}
          path: apps/desktop/artifacts/*
          if-no-files-found: error
          retention-days: ${{ needs.resolve.outputs.channel == 'nightly' && 14 || 90 }}

  publish:
    name: Publish ${{ needs.resolve.outputs.channel }}
    needs:
      - resolve
      - build
    if: needs.resolve.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-${{ needs.resolve.outputs.channel }}-*
          path: desktop-release
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_RELEASE_TAG: ${{ needs.resolve.outputs.version_release_tag }}
          UPDATE_RELEASE_TAG: ${{ needs.resolve.outputs.update_release_tag }}
          RELEASE_TITLE: ${{ needs.resolve.outputs.title }}
          UPDATE_RELEASE_TITLE: ${{ needs.resolve.outputs.update_title }}
          VERSION: ${{ needs.resolve.outputs.version }}
          PRERELEASE: ${{ needs.resolve.outputs.prerelease }}
          CHANNEL: ${{ needs.resolve.outputs.channel }}
        shell: bash
        run: |
          set -euo pipefail

          notes_file="$(mktemp)"
          {
            echo "Channel: ${CHANNEL}"
            echo "Version: ${VERSION}"
            echo "Commit: ${GITHUB_SHA}"
            echo "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } > "$notes_file"

          publish_release() {
            local release_tag="$1"
            local release_title="$2"

            if gh release view "$release_tag" >/dev/null 2>&1; then
              edit_args=(
                "$release_tag"
                --title "$release_title"
                --notes-file "$notes_file"
                --latest=false
              )
              if [[ "$PRERELEASE" == "true" ]]; then
                edit_args+=(--prerelease)
              else
                edit_args+=(--prerelease=false)
              fi

              gh release edit "${edit_args[@]}"
            else
              create_args=(
                "$release_tag"
                --target "$GITHUB_SHA"
                --title "$release_title"
                --notes-file "$notes_file"
                --latest=false
              )
              if [[ "$PRERELEASE" == "true" ]]; then
                create_args+=(--prerelease)
              fi

              gh release create "${create_args[@]}"
            fi

            gh release upload "$release_tag" desktop-release/* --clobber
          }

          publish_release "$VERSION_RELEASE_TAG" "$RELEASE_TITLE"
          publish_release "$UPDATE_RELEASE_TAG" "$UPDATE_RELEASE_TITLE"
