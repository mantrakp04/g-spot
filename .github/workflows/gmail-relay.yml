name: Gmail relay

on:
  pull_request:
    paths:
      - ".github/workflows/gmail-relay.yml"
      - "apps/gmail-relay/**"
      - "packages/chat-adapter-gmail/**"
      - "packages/chat-state-sqlite/**"
      - "packages/config/**"
      - "packages/env/**"
      - "package.json"
      - "bun.lock"
      - "bunfig.toml"
      - "turbo.json"
  push:
    branches: [main]
    paths:
      - ".github/workflows/gmail-relay.yml"
      - "apps/gmail-relay/**"
      - "packages/chat-adapter-gmail/**"
      - "packages/chat-state-sqlite/**"
      - "packages/config/**"
      - "packages/env/**"
      - "package.json"
      - "bun.lock"
      - "bunfig.toml"
      - "turbo.json"
  workflow_dispatch:

concurrency:
  group: gmail-relay-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify relay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun check-types

      - name: Verify relay DB migrations
        run: bun run --filter @g-spot/chat-state-sqlite test:migrations

  deploy:
    name: Deploy relay
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --config apps/gmail-relay/fly.toml --remote-only
