name: Relay DB migrations

on:
  pull_request:
    paths:
      - "packages/relay-db/**"
      - ".github/workflows/relay-db-migrate.yml"
  push:
    branches: [main]
    paths:
      - "packages/relay-db/**"
      - ".github/workflows/relay-db-migrate.yml"
  workflow_dispatch:

concurrency:
  group: relay-db-migrate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify migration graph (SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: drizzle-kit check
        working-directory: packages/relay-db
        env:
          DATABASE_URL: file:${{ runner.temp }}/relay-ci-check.db
        run: bun run db:check

      - name: Apply migrations to fresh DB
        working-directory: packages/relay-db
        env:
          DATABASE_URL: file:${{ runner.temp }}/relay-ci-migrate.db
        run: bun run db:migrate

  migrate-remote:
    name: Apply migrations (remote libSQL / Turso)
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Check remote DB secrets
        id: gate
        env:
          RELAY_DB_URL: ${{ secrets.RELAY_DATABASE_URL }}
          RELAY_DB_TOKEN: ${{ secrets.RELAY_LIBSQL_AUTH_TOKEN }}
        run: |
          if [ -z "$RELAY_DB_URL" ] || [ -z "$RELAY_DB_TOKEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Remote relay DB secrets not set; skipping production migrate."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != 'true'

      - uses: oven-sh/setup-bun@v2
        if: steps.gate.outputs.skip != 'true'
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: bun install --frozen-lockfile

      - name: drizzle-kit migrate
        if: steps.gate.outputs.skip != 'true'
        working-directory: packages/relay-db
        env:
          DATABASE_URL: ${{ secrets.RELAY_DATABASE_URL }}
          LIBSQL_AUTH_TOKEN: ${{ secrets.RELAY_LIBSQL_AUTH_TOKEN }}
        run: bun run db:migrate
