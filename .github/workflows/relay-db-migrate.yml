name: Relay DB migrations

on:
  pull_request:
    paths:
      - "packages/relay-db/**"
      - ".github/workflows/relay-db-migrate.yml"
  push:
    branches: [main]
    paths:
      - "packages/relay-db/**"
      - ".github/workflows/relay-db-migrate.yml"
  workflow_dispatch:

concurrency:
  group: relay-db-migrate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify migration graph (SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: drizzle-kit check
        working-directory: packages/relay-db
        env:
          DATABASE_URL: ${{ runner.temp }}/relay-ci-check.db
        run: bun run db:check

      - name: Apply migrations to fresh DB
        working-directory: packages/relay-db
        env:
          DATABASE_URL: ${{ runner.temp }}/relay-ci-migrate.db
        run: bun run db:migrate
