app = "g-spot-relay"
primary_region = "iad"

[build]
  dockerfile = "../../apps/relay/Dockerfile"

[env]
  RELAY_HOST = "0.0.0.0"
  RELAY_PORT = "8787"
  DATABASE_URL = "/data/relay.db"

[[mounts]]
  source = "relay_data"
  destination = "/data"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/ping"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
